name: Build and Push Chatbot Container to Docker Hub

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Step 1 - Check out code from GitHub
      uses: actions/checkout@v3

    - name: Step 2 - Log into Docker Hub Cloud Account
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Step 3 - Set up Docker Build Machinery
      uses: docker/setup-buildx-action@v2

    - name: Step 4 - Manufacture and Push the Finished Container
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/my-first-chatbot:latest